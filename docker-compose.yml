services:
  api:
    build: .
    container_name: enterprise-rag-api
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5

  indexer:
    build: .
    container_name: enterprise-rag-indexer
    depends_on:
      api:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-lc", "./scripts/index_sample_docs.sh"]
    volumes:
      - ./:/app
